<html><head><meta charset="utf-8"><meta name="source-wiki-viewer-version" content="5"><title>NAN</title><link rel="stylesheet" href="../styles.css"></head><body><h1>Multiple definitions: <code>NAN</code></h1><ul><li><a href="../source/src/include/utils/float.h.html#L32" target="source-view">src/include/utils/float.h:32 (macro)</a></li><li><a href="../source/src/interfaces/ecpg/ecpglib/data.c.html#L76" target="source-view">src/interfaces/ecpg/ecpglib/data.c:76 (macro)</a></li></ul><script>
(function() {
  function notifyParent() {
    if (parent === window) return;
    parent.postMessage({type: "frame-location", frame: window.name || "", href: window.location.href}, "*");
  }
  document.addEventListener("click", function(event) {
    const link = event.target.closest("a[data-panel]");
    if (!link || parent === window) return;
    parent.postMessage({type: "source-link", panel: link.dataset.panel}, "*");
  });
  window.addEventListener("load", notifyParent);
  window.addEventListener("hashchange", notifyParent);
})();
</script></body></html>

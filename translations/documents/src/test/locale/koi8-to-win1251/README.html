<!doctype html>
<html><head><meta charset="utf-8"><meta name="source-wiki-viewer-version" content="5"><title>src/test/locale/koi8-to-win1251/README</title><link rel="stylesheet" href="../../../../../../styles.css"></head><body><h1>Japanese translation</h1><p><code>src/test/locale/koi8-to-win1251/README</code></p><pre>koi8-to-win1251 テスト。データベースは koi8 で作成する必要があります (createdb -E koi8)。
このテストでは koi8-to-win1251 の変換機能を使用します。
作成者: Oleg Broytmann &lt;phd2@earthling.net&gt;。エンコーディング変換用のコード作成者: Tatsuo Ishii &lt;t-ishii@sra.co.jp&gt;。</pre><script>
(function() {
  function notifyParent() {
    if (parent === window) return;
    parent.postMessage({type: "frame-location", frame: window.name || "", href: window.location.href}, "*");
  }
  document.addEventListener("click", function(event) {
    const link = event.target.closest("a[data-panel]");
    if (!link || parent === window) return;
    parent.postMessage({type: "source-link", panel: link.dataset.panel}, "*");
  });
  window.addEventListener("load", notifyParent);
  window.addEventListener("hashchange", notifyParent);
})();
</script></body></html>

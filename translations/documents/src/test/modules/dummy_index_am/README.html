<html><head><meta charset="utf-8"><meta name="source-wiki-viewer-version" content="5"><title>src/test/modules/dummy_index_am/README</title><link rel="stylesheet" href="../../../../../../styles.css"></head><body><h1>Japanese translation</h1><p><code>src/test/modules/dummy_index_am/README</code></p><pre>ダミーインデックス AM
====================

ダミーインデックス AM は、インデックスアクセスメソッドで使用可能なあらゆる機能をテストするためのモジュールであり、そのコードは最大限シンプルに保たれています。

これには、以下のすべてのリレーションオプション型のテストが含まれます。
- boolean
- enum
- integer
- real
- strings (デフォルト値として NULL を含む場合と含まない場合)</pre><script>
(function() {
  function notifyParent() {
    if (parent === window) return;
    parent.postMessage({type: "frame-location", frame: window.name || "", href: window.location.href}, "*");
  }
  window.addEventListener("load", notifyParent);
  window.addEventListener("hashchange", notifyParent);
})();
</script></body></html>

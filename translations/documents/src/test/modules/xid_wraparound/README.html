<!doctype html>
<html><head><meta charset="utf-8"><meta name="source-wiki-viewer-version" content="5"><title>src/test/modules/xid_wraparound/README</title><link rel="stylesheet" href="../../../../../../styles.css"></head><body><h1>Japanese translation</h1><p><code>src/test/modules/xid_wraparound/README</code></p><pre>このモジュールには、XIDラップアラウンドのテストが含まれています。これらのテストでは、2つのヘルパー関数を使用して大量のXIDを素早く消費し、XIDラップアラウンドに早期に到達するようにしています。</pre><script>
(function() {
  function notifyParent() {
    if (parent === window) return;
    parent.postMessage({type: "frame-location", frame: window.name || "", href: window.location.href}, "*");
  }
  document.addEventListener("click", function(event) {
    const link = event.target.closest("a[data-panel]");
    if (!link || parent === window) return;
    parent.postMessage({type: "source-link", panel: link.dataset.panel}, "*");
  });
  window.addEventListener("load", notifyParent);
  window.addEventListener("hashchange", notifyParent);
})();
</script></body></html>

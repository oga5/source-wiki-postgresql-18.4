<html><head><meta charset="utf-8"><meta name="source-wiki-viewer-version" content="5"><title>src/test/modules/test_pg_dump/README</title><link rel="stylesheet" href="../../../../../../styles.css"></head><body><h1>Japanese translation</h1><p><code>src/test/modules/test_pg_dump/README</code></p><pre>test_pg_dump は、システム内に拡張機能が存在する場合の pg_dump をテストするために明示的に作成された拡張機能です。

また、このモジュールを利用して ALTER EXTENSION ADD/DROP のテストも行います。</pre><script>
(function() {
  function notifyParent() {
    if (parent === window) return;
    parent.postMessage({type: "frame-location", frame: window.name || "", href: window.location.href}, "*");
  }
  document.addEventListener("click", function(event) {
    const link = event.target.closest("a[data-panel]");
    if (!link || parent === window) return;
    parent.postMessage({type: "source-link", panel: link.dataset.panel}, "*");
  });
  window.addEventListener("load", notifyParent);
  window.addEventListener("hashchange", notifyParent);
})();
</script></body></html>

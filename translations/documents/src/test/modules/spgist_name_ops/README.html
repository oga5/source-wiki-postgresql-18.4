<!doctype html>
<html><head><meta charset="utf-8"><meta name="source-wiki-viewer-version" content="3"><title>src/test/modules/spgist_name_ops/README</title><link rel="stylesheet" href="../../../../../../styles.css"></head><body><h1>Japanese translation</h1><p><code>src/test/modules/spgist_name_ops/README</code></p><pre>spgist_name_ops は、&quot;name&quot; 型の列をインデックス化する SP-GiST 演算子クラスを実装しますが、そのストレージは SP-GiST の text_ops で使用されるものと同一です。

これ自体はそれほど有用ではないかもしれませんが、インデックス化されたデータ型がリーフデータ型と異なり、かつ元のインデックス値を再構築できるケースをテストすることが可能になります。そのような状況は、組み込みの SP-GiST 演算子クラスではテストされていません。</pre><script>
(function() {
  function notifyParent() {
    if (parent === window) return;
    parent.postMessage({type: "frame-location", frame: window.name || "", href: window.location.href}, "*");
  }
  window.addEventListener("load", notifyParent);
  window.addEventListener("hashchange", notifyParent);
})();
</script></body></html>

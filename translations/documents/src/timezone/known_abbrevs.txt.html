<!doctype html>
<html><head><meta charset="utf-8"><meta name="source-wiki-viewer-version" content="5"><title>src/timezone/known_abbrevs.txt</title><link rel="stylesheet" href="../../../../styles.css"></head><body><h1>Japanese translation</h1><p><code>src/timezone/known_abbrevs.txt</code></p><pre>このデータは、タイムゾーンのオフセット（時差）と、夏時間（D）の有無を示す識別子を秒単位で定義したものです。</pre><script>
(function() {
  function notifyParent() {
    if (parent === window) return;
    parent.postMessage({type: "frame-location", frame: window.name || "", href: window.location.href}, "*");
  }
  document.addEventListener("click", function(event) {
    const link = event.target.closest("a[data-panel]");
    if (!link || parent === window) return;
    parent.postMessage({type: "source-link", panel: link.dataset.panel}, "*");
  });
  window.addEventListener("load", notifyParent);
  window.addEventListener("hashchange", notifyParent);
})();
</script></body></html>

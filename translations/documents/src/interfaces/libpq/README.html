<html><head><meta charset="utf-8"><meta name="source-wiki-viewer-version" content="4"><title>src/interfaces/libpq/README</title><link rel="stylesheet" href="../../../../../styles.css"></head><body><h1>Japanese translation</h1><p><code>src/interfaces/libpq/README</code></p><pre>src/interfaces/libpq/README

このディレクトリには、POSTGRESフロントエンドライブラリであるLibpqのC言語版が含まれています。</pre><script>
(function() {
  function notifyParent() {
    if (parent === window) return;
    parent.postMessage({type: "frame-location", frame: window.name || "", href: window.location.href}, "*");
  }
  window.addEventListener("load", notifyParent);
  window.addEventListener("hashchange", notifyParent);
})();
</script></body></html>

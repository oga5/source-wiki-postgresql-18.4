<html><head><meta charset="utf-8"><meta name="source-wiki-viewer-version" content="3"><title>src/interfaces/ecpg/test/connect/README</title><link rel="stylesheet" href="../../../../../../../styles.css"></head><body><h1>Japanese translation</h1><p><code>src/interfaces/ecpg/test/connect/README</code></p><pre>src/interfaces/ecpg/test/connect/README

このディレクトリ内のプログラムは、あらゆる種類の接続をテストします。

他のすべてのプログラムは、標準的な接続方法を1つだけ使用します。

リグレッションデータベースの詳細（ポート、Unixソケットファイル、ユーザー名、パスワードなど）が変更された場合、これらのプログラムにはハードコードされた値が含まれているため、それらも変更する必要があります。</pre><script>
(function() {
  function notifyParent() {
    if (parent === window) return;
    parent.postMessage({type: "frame-location", frame: window.name || "", href: window.location.href}, "*");
  }
  window.addEventListener("load", notifyParent);
  window.addEventListener("hashchange", notifyParent);
})();
</script></body></html>
